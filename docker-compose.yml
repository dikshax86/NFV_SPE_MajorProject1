services:

  firewall:
    build: ./firewall-service
    ports:
      - "5000:5000"

  monitor:
    build: ./monitor-service
    ports:
      - "5002:5002"

  switch:
    build: ./switch-service
    ports:
      - "5001:5001"
    depends_on:
      - firewall
      - monitor

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
