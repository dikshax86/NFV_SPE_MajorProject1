apiVersion: v1
kind: PersistentVolume

metadata:
  name: elasticsearch-pv

spec:
  capacity:
    storage: 1Gi

  accessModes:
    - ReadWriteOnce

  hostPath:
    path: /data/elasticsearch

---
apiVersion: v1
kind: PersistentVolumeClaim

metadata:
  name: elasticsearch-pvc
  namespace: nfv-system

spec:
  accessModes:
    - ReadWriteOnce

  resources:
    requests:
      storage: 1Gi
