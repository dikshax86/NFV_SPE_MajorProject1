apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: nfv-ingress
  namespace: nfv-system

spec:
  rules:
  - host: nfv.local

    http:
      paths:
      - path: /
        pathType: Prefix

        backend:
          service:
            name: switch

            port:
              number: 5001
