apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: firewall-hpa
  namespace: nfv-system

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: firewall

  minReplicas: 1
  maxReplicas: 5

  metrics:
  - type: Resource

    resource:
      name: cpu

      target:
        type: Utilization
        averageUtilization: 10
